name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_suffix: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_suffix: ""
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Rust
        run: |
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ "${version}" == refs/* ]]; then
            version="dev"
          fi

          package_name="crab-${version}-${{ matrix.target }}"
          package_dir="dist/${package_name}"
          binary="target/${{ matrix.target }}/release/crab${{ matrix.bin_suffix }}"

          mkdir -p "${package_dir}/docs" "${package_dir}/scripts"
          cp "${binary}" "${package_dir}/"
          cp README.md README.zh-CN.md LICENSE "${package_dir}/"
          cp docs/INSTALL.md docs/INSTALL.zh-CN.md docs/QUICKSTART.md docs/QUICKSTART.zh-CN.md "${package_dir}/docs/"
          cp scripts/install.sh scripts/install.ps1 "${package_dir}/scripts/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path '${package_dir}/*' -DestinationPath 'dist/${package_name}.zip' -Force"
            archive_path="dist/${package_name}.zip"
          else
            tar -czf "dist/${package_name}.tar.gz" -C dist "${package_name}"
            archive_path="dist/${package_name}.tar.gz"
          fi

          archive_dir="$(dirname "${archive_path}")"
          archive_file="$(basename "${archive_path}")"
          if command -v shasum >/dev/null 2>&1; then
            (cd "${archive_dir}" && shasum -a 256 "${archive_file}" > "${archive_file}.sha256")
          else
            (cd "${archive_dir}" && sha256sum "${archive_file}" > "${archive_file}.sha256")
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: crab-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  build-desktop:
    name: Build desktop installer (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Rust
        run: |
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop-shell/package-lock.json

      - name: Check desktop release packaging
        run: node scripts/check-desktop-release.mjs

      - name: Install frontend dependencies
        working-directory: desktop-shell
        run: npm ci

      - name: Build and package installer
        shell: bash
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CRAB_VERSION: ${{ github.ref_name }}
          CRAB_TARGET: ${{ matrix.target }}
          CRAB_DESKTOP_BUNDLE: ${{ matrix.bundles }}
        run: |
          scripts/package-desktop.sh

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: crab-desktop-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.sha256
            dist/*.json
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${tag}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --generate-notes \
              --prerelease
          fi
