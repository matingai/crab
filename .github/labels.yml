# Canonical label set for the public Crab repository.
# GitHub does not import this file automatically. Maintainers can sync it with a label
# management tool or recreate the labels manually in the repository settings.

- name: "type: bug"
  color: "d73a4a"
  description: "Something is broken or behaves unexpectedly"
- name: "type: feature"
  color: "0e8a16"
  description: "New capability or meaningful behavior change"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation, examples, screenshots, or project packaging"
- name: "type: refactor"
  color: "c5def5"
  description: "Internal cleanup without intended behavior change"
- name: "type: tests"
  color: "5319e7"
  description: "Test coverage, fixtures, or verification workflow"
- name: "area: agent-loop"
  color: "7c3aed"
  description: "Goal-state controller, prompts, recovery, or solve traces"
- name: "area: delegation"
  color: "0891b2"
  description: "Worker runs, submodels, delegated context, and evidence handoff"
- name: "area: tools"
  color: "fb923c"
  description: "Built-in tools, schemas, approvals, and tool observations"
- name: "area: desktop"
  color: "111827"
  description: "Next.js, Electron, Tauri, bridge, and UI event timeline"
- name: "area: memory-skills"
  color: "10b981"
  description: "Memory, skills, recall, and local knowledge loops"
- name: "area: security"
  color: "b60205"
  description: "Security, privacy, tool boundaries, and secret handling"
- name: "needs triage"
  color: "fbca04"
  description: "Needs maintainer review"
- name: "good first issue"
  color: "7057ff"
  description: "Good entry point for new contributors"
- name: "help wanted"
  color: "008672"
  description: "Maintainers would welcome community help"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates"
- name: "blocked"
  color: "000000"
  description: "Cannot move forward without another change or decision"
