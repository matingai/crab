name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Rust
        run: |
          rustup default stable
          rustup component add rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

  desktop:
    name: Desktop shell build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-shell
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop-shell/package-lock.json

      - name: Check desktop release packaging
        working-directory: ${{ github.workspace }}
        run: node scripts/check-desktop-release.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
